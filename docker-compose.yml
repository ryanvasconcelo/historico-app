services:
  postgres:
    image: postgres:16-alpine
    container_name: historico-postgres
    environment:
      POSTGRES_USER: historico
      POSTGRES_PASSWORD: historico
      POSTGRES_DB: historico
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U historico -d historico"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
